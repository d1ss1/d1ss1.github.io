<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Угадай число</title>
    <style>
        body { text-align: center; margin-top: 50px; }
        h1 { color: darkblue; }
        button { padding: 10px 20px; font-size: 18px; }
        #message { font-size: 20px; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Угадай число</h1>
    <p>Я загадал число от 1 до 100. Попробуй угадать!</p>
    <input id="guessInput" type="number">
    <button id="checkBtn">Проверить</button>
    <p id="message"></p>
    <script>
        let number = Math.floor(Math.random() * 100) + 1;

        document.getElementById("checkBtn").addEventListener("click", function () {
            let guess = Number(document.getElementById("guessInput").value);

            if (guess === number) {
                document.getElementById("message").textContent = "Ты угадал!";
            }
            else if (guess < number) {
                document.getElementById("message").textContent = "Число было больше";
            }
            else {
                document.getElementById("message").textContent = "Число было меньше";
            }

            document.getElementById("guessInput").value = "";
        });
    </script>
</body>
</html>
